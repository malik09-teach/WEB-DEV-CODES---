<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile Card</title>
  
  <style>
    /* 1. Style the main background */
    body {
      background-color: #e2e8f0; /* A soft blue-gray background */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 50px;
      display: flex;
      justify-content: center; /* Centers the card on the screen */
    }

    /* 2. Style the exact Div container (The Card) */
    .profile-card {
      background-color: white;
      width: 300px;
      padding: 30px;
      border-radius: 15px; /* Rounds the corners of the box */
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1); /* Adds a 3D shadow */
      text-align: center; /* Centers all text inside */
    }

    /* 3. Style the image */
    .profile-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%; /* Makes the image a perfect circle! */
      border: 4px solid #3b82f6; /* Adds a blue ring around the image */
      object-fit: cover;
    }

    /* 4. Style the text and button */
    .profile-card h2 {
      color: #1e293b;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    .profile-card p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .profile-card button {
      background-color: #3b82f6; /* Blue button */
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px; /* Pill-shaped button */
      font-size: 16px;
      cursor: pointer;
    }

    /* 5. Add a hover effect to the button */
    .profile-card button:hover {
      background-color: #2563eb; /* Turns a darker blue when you hover over it */
    }
  </style>

</head>
<body>

  <div class="profile-card">
    
    <img src="https://i.pravatar.cc/150?img=11" alt="Profile Picture">
    
    <h2>Mohammad</h2>
    <p>Future Front-End Developer | Code Enthusiast</p>
    
    <button>Connect</button>

  </div>

</body>
</html>
