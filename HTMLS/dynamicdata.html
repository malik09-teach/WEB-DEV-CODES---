<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real API Fetch Example</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
            text-align: center;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        /* The Grid to hold our User Cards */
        #user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Styling for each individual User Card */
        .user-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
            border-top: 4px solid #2563eb;
            animation: fadeIn 0.5s ease-in;
        }

        .user-card h3 { margin: 0 0 10px 0; color: #1e293b; }
        .user-card p { margin: 5px 0; font-size: 14px; color: #64748b; }
        
        .company-tag {
            display: inline-block;
            background-color: #e2e8f0;
            color: #475569;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Simple animation so they pop in nicely */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h2>Customer Directory Data Fetch</h2>
    <button id="fetch-btn">Fetch Users from API</button>

    <div id="user-grid">
        <!-- The user cards will magically appear here -->
    </div>

    <script>
        // 1. Grab the HTML elements
        const fetchBtn = document.getElementById("fetch-btn");
        const userGrid = document.getElementById("user-grid");

        // 2. The Async Fetch Function
        async function loadUsers() {
            try {
                // Change button text while loading
                fetchBtn.innerText = "Loading data...";
                fetchBtn.disabled = true;

                // AWAIT the response from the real internet URL
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                
                // AWAIT the conversion from text into a JavaScript Array
                const usersData = await response.json();

                // Clear the grid just in case we click the button twice
                userGrid.innerHTML = "";

                // 3. Loop through the data and build the DOM
                usersData.forEach(user => {
                    // Create the card container
                    const card = document.createElement("div");
                    card.classList.add("user-card");

                    // Inject the HTML inside the card using the API data
                    card.innerHTML = `
                        <h3>${user.name}</h3>
                        <p>📧 ${user.email}</p>
                        <p>📞 ${user.phone}</p>
                        <span class="company-tag">🏢 ${user.company.name}</span>
                    `;

                    // Attach the finished card to the screen
                    userGrid.appendChild(card);
                });

                // Reset the button
                fetchBtn.innerText = "Data Loaded Successfully!";

            } catch (error) {
                // If your internet is down, or the link is broken, this runs.
                console.error("Error fetching data:", error);
                fetchBtn.innerText = "Error loading data. Try again.";
                fetchBtn.disabled = false;
            }
        }

        // 4. Attach the event listener to the button
        fetchBtn.addEventListener("click", loadUsers);
    </script>

</body>
</html>
