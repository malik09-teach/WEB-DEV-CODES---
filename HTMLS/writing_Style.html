<!-- The border="1" attribute is just a quick trick so you can actually see the grid lines! -->
<table border="1">
  
  <!-- ROW 1: This is our header row with titles -->
  <tr>
    <th>Type</th>
    <th>Definition</th>
    <th>Usage</th>
  </tr>

  <!-- ROW 2: Our first row of actual data -->
  <tr>
    <td>Container Tags</td>
    <td>Tags with both opening and closing tags (like &lt;p&gt; and &lt;div&gt;)</td>
    <td>Group and structure content.</td>
  </tr>

  <!-- ROW 3: Our second row of data -->
  <tr>
    <td>Empty Tags</td>
    <td>Tags without closing tags (like &lt;img&gt; and &lt;br&gt;)</td>
    <td>Insert elements that don't hold text inside them.</td>
  </tr>

</table>
