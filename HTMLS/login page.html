<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page </title>

<style>

body {
    display: flex;
    background-color: rgb(145, 145, 145);
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
  }

form{
display: flex;
flex-direction: column;
width: 300px;
padding: 20px;
border: 1px solid #cccc;
border-radius: 15px;

}

label{

margin: 5px;
padding: 2px;
font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

input{
    padding: 5px;
}
button, .signup-link {
    width: 100px;
    border-radius: 10px;
    margin: 5px;
    background-color: rgb(138, 112, 81);
    display: inline-block;
    text-align: center;
    padding: 5px 0;
    color: black;
    text-decoration: none;
    border: 1px solid rgb(138, 112, 81); /* Matches background to look like a button border */
    cursor: pointer;
}



</style>


</head>


<body>

    <form id="login page " action="welcomepage.html">

    <label><h2>login page</h2> </label>


    <label >Enter user name:</label>
    <input type="text" placeholder="enter user name ">


<br>
    <label >Enter pass word:</label>
    <input type="text" placeholder="enter password ">
<br>

<div>

<button type"submit">log in </button>


<a href="reg.html" class="signup-link">sign up</a>

</div>




    </form>

</body>
</html>
